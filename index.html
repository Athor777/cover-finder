<meta charset="UTF-8">

<meta name="theme-color" content="#0e0e10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cover Finder">
<title>Cover Finder - Manuele Cover</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --red: #c8252b;
  --red-dim: #8a1a1f;
  --bg: #0e0e10;
  --bg-2: #17171a;
  --bg-3: #1f1f24;
  --line: #2a2a30;
  --text: #ececec;
  --text-dim: #9a9aa3;
  --gold: #d4a64a;
  --green: #4ac28a;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
}
body {
  padding-bottom: 80px;
}

.header {
  background: linear-gradient(180deg, #15151a 0%, #0e0e10 100%);
  border-bottom: 1px solid var(--line);
  padding: 22px 20px 18px;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  max-width: 1200px;
  margin: 0 auto;
}
.logo {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo .accent { color: var(--red); }
.tag {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.stats {
  max-width: 1200px;
  margin: 14px auto 0;
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  font-size: 13px;
}
.stat { color: var(--text-dim); }
.stat strong { color: var(--text); font-weight: 700; }

.controls {
  max-width: 1200px;
  margin: 0 auto;
  padding: 18px 20px 6px;
}
.search {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.15s;
}
.search:focus { border-color: var(--red); }
.search::placeholder { color: var(--text-dim); }

.filter-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}
.filter-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-right: 4px;
  align-self: center;
  font-weight: 600;
}
.chip {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-dim);
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
  user-select: none;
}
.chip:hover { color: var(--text); border-color: #3a3a42; }
.chip.active {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
}

.grid {
  max-width: 1200px;
  margin: 0 auto;
  padding: 18px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 0.15s, transform 0.15s;
  position: relative;
  overflow: hidden;
}
.card:hover { border-color: #3a3a42; }
.card[data-status="done"] { opacity: 0.55; }
.card[data-status="done"]::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--green);
}
.card[data-status="wip"]::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--gold);
}

.card-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.badge {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 700;
}
.badge-year {
  background: var(--red-dim);
  color: #fff;
}
.card-title {
  font-size: 17px;
  font-weight: 700;
  line-height: 1.25;
  letter-spacing: -0.3px;
}
.card-source {
  font-size: 13px;
  color: var(--text-dim);
}
.card-source strong { color: var(--text); font-weight: 600; }
.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.btn {
  flex: 1;
  min-width: 0;
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--line);
  background: var(--bg-3);
  color: var(--text);
  text-decoration: none;
  text-align: center;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  white-space: nowrap;
}
.btn:hover { border-color: var(--red); color: #fff; }
.btn-yt {
  background: #ff0000;
  border-color: #ff0000;
  color: #fff;
}
.btn-yt:hover { background: #cc0000; border-color: #cc0000; color: #fff; }

.status-select {
  flex: 1;
  background: var(--bg-3);
  color: var(--text);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  outline: none;
  font-family: inherit;
}

.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty h3 { color: var(--text); margin-bottom: 8px; font-size: 18px; }

@media (max-width: 600px) {
  .header { padding: 16px 16px 14px; }
  .logo { font-size: 19px; }
  .tag { font-size: 10px; }
  .controls { padding: 14px 16px 4px; }
  .grid { padding: 14px 16px; gap: 12px; grid-template-columns: 1fr; }
  .card { padding: 14px; }
  .stats { font-size: 12px; gap: 10px; }
  .filter-label { width: 100%; margin-bottom: 2px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="logo">Cover<span class="accent">Finder</span></div>
    <div class="tag">Videogiochi &middot; Manuele Cover</div>
  </div>
  <div class="stats" id="stats"></div>
</div>

<div class="controls">
  <input type="text" class="search" id="search" placeholder="Cerca un brano o un gioco...">

  <div class="filter-group" id="dec-filter">
    <span class="filter-label">Decennio</span>

    <button class="chip" data-stat="todo">Da fare</button>
    <button class="chip" data-stat="wip">In corso</button>
    <button class="chip" data-stat="done">Pubblicate</button>
  </div>
</div>

<div class="grid" id="grid"></div>

const STORAGE_KEY = 'coverFinderState_v2';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

let filters = { dec:'all', stat:'all', q:'' };

function keyFor(t) { return `${t.source}|${t.title}`; }
function statusOf(t) { return state[keyFor(t)] || 'todo'; }
function setStatus(t, s) {
  if (s === 'todo') delete state[keyFor(t)];
  else state[keyFor(t)] = s;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  render();
}

function decadeOf(year) {
  if (year >= 1970 && year <= 1979) return '70';
  if (year >= 1980 && year <= 1989) return '80';
  if (year >= 1990 && year <= 1999) return '90';
  if (year >= 2000 && year <= 2009) return '00';
  if (year >= 2010 && year <= 2019) return '10';
  if (year >= 2020 && year <= 2029) return '20';
  return 'other';
}

function ytSearchUrl(t) {
  const q = encodeURIComponent(`${t.source} ${t.title} ${t.by||''}`.trim());
  return `https://www.youtube.com/results?search_query=${q}`;
}

function visibleTracks() {
  const q = filters.q.toLowerCase().trim();
  return TRACKS.filter(t => {
    if (filters.dec !== 'all' && decadeOf(t.year) !== filters.dec) return false;
    if (filters.stat !== 'all' && statusOf(t) !== filters.stat) return false;
    if (q) {
      const hay = `${t.title} ${t.source} ${t.by||''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const grid = document.getElementById('grid');
  const list = visibleTracks();

  const total = TRACKS.length;
  const done = TRACKS.filter(t => statusOf(t) === 'done').length;
  const wip = TRACKS.filter(t => statusOf(t) === 'wip').length;
  const todo = total - done - wip;
  document.getElementById('stats').innerHTML = `
    <span class="stat"><strong>${total}</strong> brani totali</span>
    <span class="stat"><strong>${todo}</strong> da fare</span>
    <span class="stat"><strong>${wip}</strong> in corso</span>
    <span class="stat"><strong>${done}</strong> pubblicate</span>
    <span class="stat" style="margin-left:auto"><strong>${list.length}</strong> visibili</span>
  `;

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty"><h3>Nessun risultato</h3><p>Prova a cambiare filtri o cerca un altro titolo.</p></div>`;
    return;
  }

  grid.innerHTML = list.map(t => {
    const st = statusOf(t);
    return `
      <div class="card" data-status="${st}">
        <div class="card-meta">
          <span class="badge badge-year">${t.year}</span>
        </div>
        <div class="card-title">${escapeHtml(t.title)}</div>
        <div class="card-source">da <strong>${escapeHtml(t.source)}</strong>${t.by ? ` &middot; ${escapeHtml(t.by)}` : ''}</div>
        <div class="card-actions">
          <select class="status-select" data-key="${escapeHtml(keyFor(t))}">
            <option value="todo" ${st==='todo'?'selected':''}>Da fare</option>
            <option value="wip" ${st==='wip'?'selected':''}>In corso</option>
            <option value="done" ${st==='done'?'selected':''}>Pubblicata</option>
          </select>
          <a class="btn btn-yt" href="${ytSearchUrl(t)}" target="_blank" rel="noopener">YouTube</a>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.status-select').forEach(sel => {
    sel.addEventListener('change', e => {
      const key = sel.dataset.key;
      const t = TRACKS.find(x => keyFor(x) === key);
      if (t) setStatus(t, sel.value);
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

document.querySelectorAll('#dec-filter .chip').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#dec-filter .chip').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filters.dec = b.dataset.dec;
    render();
  });
});
document.querySelectorAll('#stat-filter .chip').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#stat-filter .chip').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filters.stat = b.dataset.stat;
    render();
  });
});
document.getElementById('search').addEventListener('input', e => {
  filters.q = e.target.value;
  render();
});

render();
</script>
